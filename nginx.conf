server {
    # Escucha dinámicamente en el puerto asignado por Cloud Run
    listen ${PORT} default_server;
    listen [::]:${PORT} default_server;

    root /usr/share/nginx/html; 
    index index.html index.htm; 
    server_name localhost;
    client_max_body_size 200M;

    # 🛑 BLOQUE PRINCIPAL: Manejo de rutas del portafolio
    location / {
        # Busca el archivo exacto, si no una carpeta con index.html, si no el archivo .html, y cae en /index.html
        try_files $uri $uri/ $uri.html /index.html;
    }
    
    # ⚡ CONTROL DE CACHÉ PARA ASSETS ESTÁTICOS (Mejora el rendimiento de carga)
    location ~* \.(jpg|jpeg|gif|png|webp|svg|css|js|ico|woff|woff2)$ {
        expires 1h; 
        add_header Cache-Control "public, must-revalidate, max-age=3600";
        access_log off;
        
        # Si un asset no existe, retorna 404 de inmediato sin pasar por el ruteo de la app
        try_files $uri =404;
    }

    # Bloquear archivos ocultos del sistema (.htaccess, .git, etc.)
    location ~ /\.ht {
        deny all;
    }
}