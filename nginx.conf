server {
    # Escucha dinámicamente en el puerto asignado por Cloud Run
    listen ${PORT} default_server;
    listen [::]:${PORT} default_server;

    root /usr/share/nginx/html; 
    index index.html index.htm; 
    server_name localhost;
    client_max_body_size 200M;

    # Evita que Nginx intente redirigir exponiendo puertos internos
    absolute_redirect off;

    # Manejo de rutas limpias para el build estático de Astro
    location / {
        # Busca el archivo exacto, el index en subcarpeta, o el archivo .html
        try_files $uri $uri/index.html $uri.html /404.html;
    }
    
    # Manejo del error 404 usando la página nativa de Astro
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
    
    # Optimización y caché para assets estáticos
    location ~* \.(jpg|jpeg|gif|png|webp|svg|css|js|ico|woff|woff2)$ {
        expires 1h; 
        add_header Cache-Control "public, must-revalidate, max-age=3600";
        access_log off;
        
        # Si un recurso estático no existe, rompe con 404 de inmediato
        try_files $uri =404;
    }

    # Bloqueo de seguridad para archivos ocultos
    location ~ /\.ht {
        deny all;
    }
}